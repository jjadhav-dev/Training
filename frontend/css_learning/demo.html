<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <style>
        nav {
            background: #c9c9c9;
            padding: 10px;
        }

        nav ul {
            list-style: none;
            border-right: 10px solid rounded;
            display: flex;
            gap: 20px;
            justify-content: space-evenly;
        }

        nav ul li {
            padding: 5px 10px;
            border-radius: 5px;
            width: 100px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        nav ul li:hover {
            background: #1d1d1d;
            font-size: large;
            font-weight: bold;
            color: #fff;
        }

        main {
            background-color: #fff;
            padding: 20px;
            margin: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .container {
            display: flex;
            gap: 20px;
            height: 400px;
            width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            overflow: scroll;
            padding: 20px;
            align-items: center;
            justify-content: center;
        }

        .text {
            height: 100px;
            width: 250px;
            border: 2px solid black;
            background: lightblue;
        }

        .somecolor {
            background-color: red;
            display: flex;
            flex-direction: column;
            text-align: center;
            justify-content: center;
        }
    
        h1:hover{
            color:greenyellow;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
    <main>
        <h1>Welcome to My Website</h1>
        <p>This is a simple website created for demonstration purposes.</p>
    </main>
    <div class="container">
        <div class="text somecolor">
            <h1>Red Div </h1>
        </div>
        <div class="text "></div>
        <div class="text"></div>
        <div class="text "></div>
        <div class="text"></div>
        <div class="text somecolor">
            <h1>Red Div </h1>
        </div>
        <div class="text somecolor">
            <h1>Red Div </h1>
        </div>
        <div class="text"></div>
        <div class="text"></div>
        <div class="text"></div>
        <div class="text"></div>
        <div class="text somecolor">
            <h1>Red Div </h1>
        </div>
        <div class="text somecolor">
            <h1>Red Div </h1>
        </div>
        <div class="text"></div>
        <div class="text"></div>
    </div>
</body>

</html>
